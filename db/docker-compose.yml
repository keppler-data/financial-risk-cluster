services:
  # ==============================================================================
  # 1. MOTOR DE BASE DE DATOS (PostgreSQL)
  # ==============================================================================
  postgres:
    image: postgres:15-alpine
    container_name: core-database
    restart: always
    
    # Aumentamos el límite de conexiones (default 100) a 250 para soportar
    # todos los workers concurrentes y el master sin que se queden en cola.
    command: ["postgres", "-c", "max_connections=250"]
    
    # Memoria compartida aumentada (256MB) fundamental para cargas analíticas.
    shm_size: 256mb
    
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - TZ=${TZ}
      
    ports:
      # Expuesto al host para que Master y Workers se conecten vía IP Privada
      - "5432:5432"
      
    volumes:
      # Persistencia de los datos físicos
      - /home/ubuntu/keppler/data/postgres:/var/lib/postgresql/data
      
    healthcheck:
      # Asegura que la BD está lista para recibir peticiones antes de que Docker la marque "sana"
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  # ==============================================================================
  # 2. INTERFAZ GRÁFICA (Adminer)
  # ==============================================================================
  adminer:
    # Cliente web ultra ligero tipo pgAdmin/dBeaver
    image: adminer:latest
    container_name: db-adminer-ui
    restart: always
    
    ports:
      # No colisiona con el 8080 de Airflow porque la BD vive en una EC2 independiente
      - "8080:8080"
      
    depends_on:
      postgres:
        condition: service_healthy
        
    logging:
      options:
        max-size: "10m"
        max-file: "3"
