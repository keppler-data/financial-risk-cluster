services:

  spark-master:
    image: apache/spark:3.5.6

    container_name: financial-risk-spark-master

    hostname: financial-risk-spark-master

    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.master.Master

    ports:
      - "7077:7077"
      - "8080:8080"

    volumes:
      - ./jobs:/opt/spark/jobs

    restart: unless-stopped

  spark-worker:
    image: apache/spark:3.5.6

    container_name: financial-risk-spark-worker

    hostname: financial-risk-spark-worker

    depends_on:
      - spark-master

    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://financial-risk-spark-master:7077

    volumes:
      - ./jobs:/opt/spark/jobs

    restart: unless-stopped