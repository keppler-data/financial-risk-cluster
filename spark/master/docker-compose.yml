# ==============================================================================
# CLÚSTER SPARK OFICIAL - MÓDULO MASTER (EC2 MASTER)
# ==============================================================================

# Fijamos el nombre del proyecto. Así Docker no se confunde si mueves las carpetas.
name: keppler-spark-master

services:

  # ----------------------------------------------------------------------------
  # CONTENEDOR DE INICIALIZACIÓN: Repara permisos automáticamente
  # ----------------------------------------------------------------------------
  fix-permissions:
    image: alpine:latest
    user: "0:0" # Corre como root de forma temporal
    container_name: spark-master-init
    volumes:
      # Montamos la carpeta raíz de datos de tu EC2
      - /home/ubuntu/keppler/data:/mnt/data
    # Cambia el dueño a 1000:1000 y se apaga inmediatamente
    command: chown -R 1000:1000 /mnt/data

  # ----------------------------------------------------------------------------
  # SERVICIO PRINCIPAL: Spark Master
  # ----------------------------------------------------------------------------
  spark-master:
    image: apache/spark:${SPARK_VERSION}
    container_name: core-spark-master
    user: "0:0" # Corre seguro como tu usuario ubuntu
    network_mode: host # para que use su ip real
    
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    
    environment:
      - TZ=${TZ}
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080

    ports:
      - "${SPARK_MASTER_PORT}:7077"       # Comunicación RPC interna para Workers
      - "${SPARK_MASTER_WEBUI_PORT}:8080" # UI Web expuesta externamente

    volumes:
      - /home/ubuntu/keppler/data-platform/pipelines:/opt/spark/pipelines:ro
      - /home/ubuntu/keppler/data/volumes/spark/master/data:/opt/spark/work
      - /home/ubuntu/keppler/data/volumes/spark/master/logs:/opt/spark/logs

    restart: unless-stopped

    # CONTROL DE FLUJO: Spark no arranca hasta que el fix de permisos termine con éxito
    depends_on:
      fix-permissions:
        condition: service_completed_successfully

    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080')"]
      interval: 20s
      timeout: 10s
      retries: 3
