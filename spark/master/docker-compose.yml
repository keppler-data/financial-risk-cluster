# ==============================================================================
# CLÚSTER SPARK - MÓDULO MASTER (EC2 MASTER)
# ==============================================================================

services:
  spark-master:
    image: bitnami/spark:${SPARK_VERSION}
    container_name: core-spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
      - TZ=${TZ}
    ports:
      - "${SPARK_MASTER_PORT}:7077"      # Comunicación RPC
      - "${SPARK_MASTER_WEBUI_PORT}:8080" # UI Web (Maquetada al 8181 externo)
    volumes:
      # Sincronización de scripts de pipelines y datos locales
      - /home/ubuntu/keppler/data-platform/pipelines/scripts:/opt/bitnami/spark/scripts
      - /home/ubuntu/keppler/data/volume:/opt/bitnami/spark/data
      # Logs del master
      - /opt/keppler/data/spark/master-logs:/opt/bitnami/spark/logs
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 20s
      timeout: 10s
      retries: 3