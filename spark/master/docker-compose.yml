services:

  spark-master:
    image: apache/spark:latest

    container_name: financial-risk-spark-master

    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.master.Master

    ports:
      - "7077:7077"
      - "8080:8080"

    networks:
      - financial-risk-network

networks:
  financial-risk-network:
    external: true