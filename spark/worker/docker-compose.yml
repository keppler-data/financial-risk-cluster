name: keppler-spark-worker

services:
  # ==============================================================================
  # 1. INIT: Reparación de permisos
  # ==============================================================================
  fix-permissions:
    image: alpine:latest
    user: "0:0"
    container_name: spark-worker-init
    volumes:
      - /home/ubuntu/keppler/data/spark:/mnt/spark
    command: sh -c "chown -R 1000:1000 /mnt/spark && chmod -R 775 /mnt/spark"

  # ==============================================================================
  # 2. SERVICIO PRINCIPAL: Spark Worker
  # ==============================================================================
  spark-worker:
    image: apache/spark:${SPARK_VERSION}
    container_name: core-spark-worker
    
    # Eliminado el hack user: '1000:0', en su lugar creamos el usuario nativamente
    network_mode: host
    
    command: >
      bash -c "if ! id -u ubuntu > /dev/null 2>&1; then useradd -u 1000 -m ubuntu; fi && chown -R ubuntu:ubuntu /opt/spark/work && pip3 install --no-cache-dir numpy pandas pyarrow && su ubuntu -c '/opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://${SPARK_MASTER_HOST}:${SPARK_MASTER_PORT}'"

    environment:
      - TZ=${TZ}
      - HOME=/opt/spark/work
      - SPARK_USER=ubuntu
      - HADOOP_USER_NAME=ubuntu
      - SPARK_DAEMON_JAVA_OPTS=-Duser.name=ubuntu
      - SPARK_WORKER_CORES=${SPARK_WORKER_CORES}
      - SPARK_WORKER_MEMORY=${SPARK_WORKER_MEMORY}
      - SPARK_WORKER_WEBUI_PORT=${SPARK_WORKER_WEBUI_PORT:-8081}
      - SPARK_WORKER_PORT=${SPARK_WORKER_PORT}
      - SPARK_LOCAL_IP=${MY_PRIVATE_IP}

    volumes:
      # Lectura de los pipelines
      - /home/ubuntu/keppler/data-platform/pipelines:/opt/spark/pipelines:ro
      # Persistencia alineada a la arquitectura global
      - /home/ubuntu/keppler/data/spark/worker/data:/opt/spark/work
      - /home/ubuntu/keppler/data/spark/worker/logs:/opt/spark/logs

    restart: unless-stopped

    depends_on:
      fix-permissions:
        condition: service_completed_successfully

    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${SPARK_WORKER_WEBUI_PORT:-8081}')"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 15s
      
    logging:
      options:
        max-size: "10m"
        max-file: "3"
