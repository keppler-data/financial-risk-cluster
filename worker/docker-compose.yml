name: keppler-airflow-worker

x-airflow-common: &airflow-common
  build:
    context: ..
  env_file:
    - .env
  # Evita problemas de permisos mapeando al usuario del host (ubuntu)
  user: "${AIRFLOW_UID:-1000}:0"
  volumes:
    - /home/ubuntu/keppler/data-platform/pipelines/dags:/opt/airflow/dags
    - /home/ubuntu/keppler/data-platform/pipelines:/opt/airflow/pipelines
    - ./logs:/opt/airflow/logs
    - ./config:/opt/airflow/config
  logging:
    options:
      max-size: "10m"
      max-file: "3"

services:
  airflow-worker:
    <<: *airflow-common
    container_name: airflow-${NAME_DOCKER:-Worker-1}
    hostname: ${CELERY_HOSTNAME}
    ports:
      - "8793:8793" # Puerto para que el Master consulte los logs locales (si falla S3)
    # Autoscale 4,1 es ideal para EC2 de 2 Cores y 4GB RAM
    command: airflow celery worker --autoscale=4,1 --queues=${QUEUES}
    restart: always
    environment:
      # Evita problemas con el manejo de señales de Linux (PID 1)
      DUMB_INIT_SETSID: "0"
    healthcheck:
      test: [ "CMD-SHELL", "celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d celery@$$HOSTNAME" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
