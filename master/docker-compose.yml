name: keppler-airflow-master

x-airflow-common: &airflow-common
  build:
    context: ..
  env_file:
    - .env
  # Evita problemas de permisos en EC2 mapeando al usuario del host (ubuntu)
  user: "${AIRFLOW_UID:-1000}:0"
  volumes:
    - /home/ubuntu/keppler/data-platform/pipelines/dags/:/opt/airflow/dags
    - /home/ubuntu/keppler/data-platform/pipelines:/opt/airflow/pipelines
    - ./logs:/opt/airflow/logs
    - ./config:/opt/airflow/config
  logging:
    options:
      max-size: "10m"
      max-file: "3"

services:
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    user: "0:0"
    command: >
      bash -c "
        until airflow db check; do
          echo 'Waiting for metadata DB...';
          sleep 2;
        done;
        airflow db migrate
      "

  airflow-apiserver:
    <<: *airflow-common
    container_name: airflow-api-server
    command: airflow api-server
    ports:
      - "8080:8080"
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: airflow scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    container_name: airflow-dag-processor
    command: airflow dag-processor
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    container_name: airflow-triggerer
    command: airflow triggerer
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  flower:
    <<: *airflow-common
    container_name: airflow-flower
    command: airflow celery flower
    ports:
      - "5555:5555"
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully
