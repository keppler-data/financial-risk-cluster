name: keppler-proxy

services:
  # ==============================================================================
  # PROXY INVERSO Y GESTIÓN SSL (Nginx Proxy Manager)
  # ==============================================================================
  proxy:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: nginx-proxy
    restart: unless-stopped

    environment:
      - TZ=${TZ}
      # Asegura que los archivos creados pertenezcan al usuario ubuntu (1000)
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}

    ports:
      - '80:80'   # HTTP
      - '443:443' # HTTPS
      - '81:81'   # Interfaz de administración de subdominios

    volumes:
      # Datos de configuración y base de datos interna SQLite de NPM
      - /home/ubuntu/keppler/data/proxy/data:/data
      # Certificados SSL de Let's Encrypt
      - /home/ubuntu/keppler/data/proxy/letsencrypt:/etc/letsencrypt

    healthcheck:
      test: [ "CMD", "/bin/check-health" ]
      interval: 10s
      timeout: 3s
      
    logging:
      options:
        max-size: "10m"
        max-file: "3"